<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Game | Tugas Praktikum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 id="judul-katalog">Loading List...</h1>
            <div class="user-badge">
                <p>Nama: <span id="nama-owner">...</span></p>
                <p>NIM: <span id="nim-owner">...</span></p>
            </div>
        </header>

        <main>
            <section class="input-area">
                <input type="text" id="game-input" placeholder="Masukkan judul game baru...">
                <button onclick="addGame()">Add to Library</button>
            </section>

            <section class="library-section">
                <h2>List Gaming</h2>
                <div id="game-list" class="grid-container">
                    </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
